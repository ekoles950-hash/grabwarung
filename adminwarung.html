<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Warung Basecamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-900 font-sans text-stone-200 pb-10 min-h-screen relative">

    <div id="layar-kunci" class="fixed inset-0 bg-stone-950 z-[100] flex flex-col justify-center items-center px-6">
        <div class="bg-stone-900 p-8 rounded-2xl shadow-2xl border border-stone-700 w-full max-w-sm text-center">
            <span class="text-5xl block mb-4">🔐</span>
            <h1 class="text-2xl font-extrabold text-amber-500 mb-2">Login Admin</h1>
            <p class="text-stone-400 text-sm mb-6">Akses kontrol pesanan Warung Basecamp Coffee.</p>
            
            <input type="text" id="input-username" class="w-full border-2 border-stone-700 bg-stone-800 rounded-xl p-3 text-lg text-white focus:border-amber-500 outline-none font-bold text-center mb-3" placeholder="Username">
            <input type="password" id="input-password" class="w-full border-2 border-stone-700 bg-stone-800 rounded-xl p-3 text-lg text-white focus:border-amber-500 outline-none font-bold text-center mb-4" placeholder="Password">
            
            <button onclick="cekPassword()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-extrabold py-3 rounded-xl shadow-lg transition active:scale-95 text-lg">
                Buka Brankas
            </button>
            <p id="pesan-error" class="text-red-500 mt-4 font-bold hidden animate-pulse">❌ Login Gagal!</p>
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-4">
        <div class="flex flex-col sm:flex-row justify-between items-center bg-stone-800 p-4 rounded-xl shadow-lg border border-stone-700 mb-6 gap-4 sticky top-4 z-10">
            <h1 class="text-xl sm:text-2xl font-bold text-amber-500">🛠️ Admin Order</h1>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="logoutAdmin()" class="flex-1 sm:flex-none bg-stone-700 hover:bg-stone-600 text-white font-bold py-2 px-4 rounded-lg shadow transition">Keluar</button>
                <button onclick="risetSemuaPesanan()" class="flex-1 sm:flex-none bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow transition">🗑️ Riset</button>
            </div>
        </div>

        <div id="list-pesanan" class="space-y-4">
            <p class="text-stone-400 animate-pulse text-center mt-10">Mengambil data...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const clientDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- SISTEM LOGIN PERSISTENT ---
        function cekPassword() {
            const user = document.getElementById('input-username').value;
            const pass = document.getElementById('input-password').value;
            
            // Pengecekan akun Hendri ATAU akun Eko
            if ((user === "hendri1285" && pass === "1295326") || (user === "eko" && pass === "123")) {
                localStorage.setItem('adminAkses', 'true'); 
                document.getElementById('layar-kunci').classList.add('hidden');
                ambilPesanan();
            } else {
                const err = document.getElementById('pesan-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('adminAkses');
            location.reload();
        }

        if(localStorage.getItem('adminAkses') === 'true') {
            document.getElementById('layar-kunci').classList.add('hidden');
        }

        // --- FUNGSI DATA ---
        async function ambilPesanan() {
            const { data } = await clientDB.from('pesanan_warung').select('*').order('created_at', { ascending: false }).limit(30);
            const wadah = document.getElementById('list-pesanan');
            if (!data || data.length === 0) { wadah.innerHTML = `<p class="text-center text-stone-500">Belum ada pesanan.</p>`; return; }

            let html = '';
            data.forEach(p => {
                let items = p.detail_pesanan.map(i => `${i.jumlah}x ${i.nama}`).join(', ');
                let bg = p.status === 'Diproses' ? 'bg-blue-950 border-blue-600' : p.status === 'Dikirim' ? 'bg-orange-950 border-orange-600' : p.status === 'Selesai' ? 'bg-green-950 border-green-600 opacity-60' : 'bg-stone-800 border-stone-600';
                
                html += `
                    <div class="${bg} border-2 p-4 rounded-xl shadow-lg">
                        <div class="flex justify-between border-b border-white/10 pb-2 mb-2">
                            <div><h2 class="font-bold text-lg text-amber-400">${p.nama_pemesan}</h2><span class="text-xs font-bold bg-white/10 px-2 rounded text-white">${p.status || 'Pending'}</span></div>
                            <p class="font-extrabold text-white">Rp ${p.total_harga.toLocaleString('id-ID')}</p>
                        </div>
                        <p class="text-sm text-stone-200 mb-3 font-bold">${items}</p>
                        <div class="flex gap-2">
                            <button onclick="ubahStatus('${p.id}', 'Diproses')" class="flex-1 bg-blue-600 py-2 rounded font-bold text-xs">👨‍🍳 Proses</button>
                            <button onclick="ubahStatus('${p.id}', 'Dikirim')" class="flex-1 bg-orange-600 py-2 rounded font-bold text-xs">🛵 Kirim</button>
                            <button onclick="ubahStatus('${p.id}', 'Selesai')" class="flex-1 bg-green-600 py-2 rounded font-bold text-xs">✅ Selesai</button>
                        </div>
                    </div>`;
            });
            wadah.innerHTML = html;
        }

        async function ubahStatus(id, stat) { await clientDB.from('pesanan_warung').update({ status: stat }).eq('id', id); ambilPesanan(); }

        async function risetSemuaPesanan() {
            if (confirm("Hapus semua pesanan?")) {
                await clientDB.from('pesanan_warung').delete().gte('total_harga', 0);
                ambilPesanan();
            }
        }

        if(localStorage.getItem('adminAkses') === 'true') ambilPesanan();
        
        clientDB.channel('admin-tracker').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pesanan_warung' }, () => {
            new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg').play();
            ambilPesanan();
        }).subscribe();
    </script>
</body>
</html>
