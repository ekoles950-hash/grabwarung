<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warung Kopi Siap Antar & Top Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animasi Tracking */
        @keyframes jalan-maju {
            0% { transform: translateX(-10px) scaleX(-1); }
            50% { transform: translateX(10px) scaleX(-1); }
            100% { transform: translateX(-10px) scaleX(-1); }
        }
        .animasi-jalan-maju { animation: jalan-maju 1.5s infinite ease-in-out; display: inline-block; }

        @keyframes lompat-jalan {
            0%, 100% { transform: translateY(0) scaleX(-1); }
            50% { transform: translateY(-8px) scaleX(-1); }
        }
        .animasi-kurir-jalan { animation: lompat-jalan 0.6s infinite; }
        .kurir-diam { transform: scaleX(-1); }
        
        /* Animasi Pop Up */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Style Khusus Menu Top Up */
        .input-dark { background-color: #1E293B; border: 1px solid #334155; color: white; transition: 0.3s; }
        .input-dark:focus { border-color: #3B82F6; outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .wallet-card { background: #1E293B; border: 2px solid #334155; cursor: pointer; transition: 0.3s; width: 100%; }
        .wallet-card.active { border-color: #3B82F6; background: #1E3A8A; transform: scale(1.02); }
        .nominal-card { background: #1E293B; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nominal-card.active { border-color: #10B981; background: #064E3B; }
    </style>
</head>
<body class="bg-stone-100 pb-24">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-24 opacity-0 z-[100] transition-all duration-300 pointer-events-none w-[90%] max-w-sm">
        <div id="toast-content" class="px-6 py-3 rounded-full shadow-2xl text-sm font-bold text-white flex items-center justify-center gap-2"></div>
    </div>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg overflow-hidden border border-stone-200 relative">
        
        <div class="bg-[#292524] text-amber-50 p-4 sticky top-0 z-10 shadow-md border-b-4 border-[#d97706] relative" id="header-utama">
            <h1 class="text-xl font-extrabold text-center tracking-wide text-[#f59e0b] leading-snug">☕PINGIN NGOPI KARO UDUT TAPI MAGER WARUNG KOPI SIAP ANTAR</h1>
            <p class="text-center text-sm text-stone-200 mt-1"> <span class="animasi-jalan-maju">🚶‍♀️</span></p>
            <button onclick="bukaModalPin()" class="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-60 hover:opacity-100 transition duration-300">⚙️</button>
        </div>  
        

        <div class="p-4 bg-stone-50 min-h-screen" id="halaman-beranda">
            <div class="flex justify-between items-center mb-3 sticky top-[92px] bg-stone-50 z-10 pt-2 pb-1 px-4">
                <h2 class="text-lg font-bold text-stone-800">Daftar Menu</h2>
                <a href="/download.html" class="bg-[#292524] text-white px-4 py-1.5 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95 transition flex items-center gap-1 shrink-0">
                    📥 INSTAL
                </a>
            </div>
            
            <div id="kategori-container" class="flex gap-2 overflow-x-auto hide-scroll mb-4 pb-2 border-b-2 border-stone-200 sticky top-[132px] bg-stone-50 z-10"></div>
            <div id="ruang-menu" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div class="bg-[#0F172A] min-h-screen flex-col items-center p-4 pt-8 pb-24 hidden" id="halaman-topup">
            </div>

        <div class="min-h-screen bg-[#131722] text-white p-5 flex-col items-center pt-8 pb-24 hidden" id="halaman-lacak-visual">
            </div>

        <div id="modal-lacak" class="hidden fixed inset-0 bg-black/80 z-50 flex justify-center items-center p-5">
            </div>

        <div id="modal-checkout" class="hidden fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center">
            </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1a1f2e] border-t border-gray-800 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.5)] z-40 flex justify-around items-center px-4 py-3 pb-safe rounded-t-3xl" id="nav-bawah">
            <button onclick="bukaModalLacak()" class="flex flex-col items-center text-gray-400 hover:text-white transition relative">
                <span class="text-2xl">🔍</span><span class="text-[9px] font-extrabold mt-1 tracking-wide">LACAK</span>
            </button>
            <button onclick="bukaBeranda()" class="flex flex-col items-center text-[#22c55e] hover:text-green-400 transition relative bg-[#1f2937] p-3 rounded-2xl -mt-8 shadow-lg border border-gray-700">
                <span class="text-3xl">🏠</span><span class="text-[9px] font-extrabold mt-1 tracking-wide text-white">BERANDA</span>
            </button>
            <button onclick="bukaTopUp()" class="flex flex-col items-center text-gray-400 hover:text-white transition relative">
                <span class="text-2xl">💳</span><span class="text-[9px] font-extrabold mt-1 tracking-wide text-center">TOP UP<br>E-WALLET</span>
            </button>
            <button onclick="bukaCheckout()" class="flex flex-col items-center text-gray-400 hover:text-white transition relative pr-2">
                <span class="text-2xl">🛒</span><span class="text-[9px] font-extrabold mt-1 tracking-wide">KERANJANG</span>
                <span id="jumlah-item-bawah" class="absolute -top-1 right-0 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold shadow-sm hidden">0</span>
            </button>
        </div>
        
        <div id="modal-success-topup" class="hidden fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-5 backdrop-blur-sm">
            </div>
        <div id="modal-toko-tutup" class="hidden fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-5 backdrop-blur-sm">

        <div id="modal-pin" class="hidden fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-5">
            </div>
        <div id="modal-admin-status" class="hidden fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-5">
            </div>
    </div>

    <script>
        // ... (Script Anda tetap sama) ...
        const PIN_RAHASIA = '1234';
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const clientDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TELE_TOKEN_KOPI = '8854342299:AAF3dBZvDDItaPS08hhYI_-0Q4ccm-dKgPs';
        const TELE_ID_KOPI = '8498622906';
        const TELE_TOKEN_TOPUP = '8854342299:AAF3dBZvDDItaPS08hhYI_-0Q4ccm-dKgPs';
        const TELE_ID_TOPUP = '8498622906'; 
        let keranjang = JSON.parse(localStorage.getItem('keranjangWarungBasecamp')) || [];
        let totalHarga = 0;
        let semuaMenuDB = [];
        let kategoriSaatIni = 'Semua';
        let pesananAktif = null;
        let isWarungBuka = true;

        async function cekStatusWarungDB() {
            try {
                const { data, error } = await clientDB.from('pengaturan_warung').select('status_buka').eq('id', 1).single();
                if (data !== null) {
                    isWarungBuka = data.status_buka;
                    document.getElementById('toggle-buka-tutup').checked = isWarungBuka;
                    perbaruiLabelStatus();
                }
            } catch (e) { console.log("Tabel pengaturan_warung belum ada."); }
        }

        function bukaModalPin() { 
            document.getElementById('modal-pin').classList.remove('hidden');
            document.getElementById('input-pin').value = '';
            setTimeout(() => document.getElementById('input-pin').focus(), 100);
        }
        
        function tutupModalPin() { document.getElementById('modal-pin').classList.add('hidden'); }

        function verifikasiPin() {
            const input = document.getElementById('input-pin').value;
            if (input === PIN_RAHASIA) {
                tutupModalPin();
                bukaModalAdmin();
            } else {
                tampilkanNotifikasi("PIN Salah! Akses ditolak.", "error");
                document.getElementById('input-pin').value = '';
                document.getElementById('input-pin').focus();
            }
        }

        document.getElementById('input-pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifikasiPin();
        });

        function bukaModalAdmin() { document.getElementById('modal-admin-status').classList.remove('hidden'); }
        function tutupModalAdmin() { document.getElementById('modal-admin-status').classList.add('hidden'); }
        function tutupModalTokoTutup() { document.getElementById('modal-toko-tutup').classList.add('hidden'); }
        function tutupModalSuccessTopup() { 
            document.getElementById('modal-success-topup').classList.add('hidden'); 
            bukaTopUp();
        }

        async function ubahStatusWarung() {
            isWarungBuka = document.getElementById('toggle-buka-tutup').checked;
            perbaruiLabelStatus();
            try {
                await clientDB.from('pengaturan_warung').update({ status_buka: isWarungBuka }).eq('id', 1);
            } catch (e) {}
        }

        function perbaruiLabelStatus() {
            const label = document.getElementById('label-status-warung');
            if (isWarungBuka) {
                label.innerText = "Status: BUKA";
                label.className = "font-extrabold text-green-600 text-lg";
            } else {
                label.innerText = "Status: TUTUP";
                label.className = "font-extrabold text-red-600 text-lg";
            }
        }

        function tampilkanNotifikasi(pesan, tipe = 'sukses') {
            const toast = document.getElementById('toast');
            const toastContent = document.getElementById('toast-content');
            toastContent.className = tipe === 'sukses' ? 'px-6 py-3 rounded-full shadow-lg text-sm font-bold text-white flex items-center justify-center gap-2 bg-green-500 w-full' : 'px-6 py-3 rounded-full shadow-lg text-sm font-bold text-white flex items-center justify-center gap-2 bg-red-500 w-full';
            toastContent.innerHTML = `<span>${pesan}</span>`;
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('-translate-y-24', 'opacity-0'); }, 3000);
        }

        function tutupSemuaHalaman() {
            document.getElementById('halaman-beranda').classList.add('hidden');
            document.getElementById('header-utama').classList.add('hidden'); 
            document.getElementById('halaman-lacak-visual').classList.add('hidden');
            document.getElementById('halaman-lacak-visual').classList.remove('flex');
            document.getElementById('halaman-topup').classList.add('hidden');
            document.getElementById('halaman-topup').classList.remove('flex');
        }

        function bukaBeranda() { 
            tutupSemuaHalaman();
            document.getElementById('halaman-beranda').classList.remove('hidden'); 
            document.getElementById('header-utama').classList.remove('hidden');
        }

        function bukaTopUp() {
            tutupSemuaHalaman();
            document.getElementById('halaman-topup').classList.remove('hidden');
            document.getElementById('halaman-topup').classList.add('flex');
            loadRiwayatLive();
        }

        function bukaLacakVisual() {
            tutupSemuaHalaman();
            document.getElementById('halaman-lacak-visual').classList.remove('hidden');
            document.getElementById('halaman-lacak-visual').classList.add('flex');
            perbaruiVisualLacak();
        }

        async function ambilDataMenu() {
            const { data } = await clientDB.from('menu_warung').select('*').order('nama_menu', { ascending: true });
            if(data) { semuaMenuDB = data; renderTombolKategori(); renderMenu(); }
        }

        function renderTombolKategori() {
            const container = document.getElementById('kategori-container');
            container.innerHTML = '';
            let listKategori = ['Semua'];
            semuaMenuDB.forEach(item => { let kat = item.kategori ? item.kategori.trim() : 'Lainnya'; if (!listKategori.includes(kat)) listKategori.push(kat); });
            listKategori.forEach(kat => {
                const isAktif = kat === kategoriSaatIni;
                const classTombol = isAktif ? 'bg-[#d97706] text-white border-[#d97706]' : 'bg-white text-stone-600 border-stone-300';
                container.innerHTML += `<button onclick="pilihKategori('${kat}')" class="${classTombol} px-4 py-1.5 rounded-full text-sm font-bold border transition">${kat}</button>`;
            });
        }

        function pilihKategori(kat) { kategoriSaatIni = kat; renderTombolKategori(); renderMenu(); }

        function renderMenu() {
            const ruangMenu = document.getElementById('ruang-menu');
            ruangMenu.innerHTML = ''; 
            const dataDisaring = semuaMenuDB.filter(item => kategoriSaatIni === 'Semua' || (item.kategori ? item.kategori.trim() : 'Lainnya') === kategoriSaatIni);
            dataDisaring.forEach(item => {
                const gambar = item.foto_url && item.foto_url !== "" ? item.foto_url : 'https://placehold.co/400x300?text=No+Image';
                ruangMenu.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden flex flex-col group">
                        <img src="${gambar}" class="w-full h-32 object-cover">
                        <div class="p-3 flex flex-col flex-grow">
                            <h3 class="font-bold text-stone-800 text-sm leading-tight flex-grow">${item.nama_menu}</h3>
                            <p class="text-[#d97706] font-extrabold text-sm mt-2">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            <button onclick="tambahKeKeranjang('${item.nama_menu.replace(/'/g, "\\'")}', ${item.harga})" class="mt-3 w-full bg-[#d97706] text-white font-bold text-xs py-2.5 rounded-lg active:scale-95 shadow-sm">BELI</button>
                        </div>
                    </div>`;
            });
        }

        function tambahKeKeranjang(nama, harga) {
            const itemAda = keranjang.find(item => item.nama === nama);
            if (itemAda) itemAda.jumlah += 1; else keranjang.push({ nama, harga, jumlah: 1 });
            localStorage.setItem('keranjangWarungBasecamp', JSON.stringify(keranjang));
            updateTampilanKeranjang(); tampilkanNotifikasi("Dimasukkan keranjang! 🛒");
        }

        function ubahJumlahItem(nama, perubahan) {
            const index = keranjang.findIndex(item => item.nama === nama);
            if (index !== -1) {
                keranjang[index].jumlah += perubahan;
                if (keranjang[index].jumlah <= 0) keranjang.splice(index, 1);
                localStorage.setItem('keranjangWarungBasecamp', JSON.stringify(keranjang));
                updateTampilanKeranjang();
            }
        }

        function updateTampilanKeranjang() {
            const badge = document.getElementById('jumlah-item-bawah');
            const listArea = document.getElementById('daftar-pesanan-checkout');
            const teksTotal = document.getElementById('total-harga-checkout');
            if (keranjang.length === 0) {
                badge.classList.add('hidden');
                listArea.innerHTML = `<div class="text-center py-6 text-stone-400">Kosong</div>`;
                teksTotal.innerText = 'Rp 0';
                return;
            }
            badge.classList.remove('hidden');
            let qty = 0; totalHarga = 0; let listHTML = '';
            keranjang.forEach(item => {
                qty += item.jumlah; totalHarga += item.harga * item.jumlah;
                listHTML += `
                    <div class="flex justify-between items-center border-b border-stone-200 py-3 last:border-0">
                        <span class="text-sm font-bold w-1/2 truncate">${item.nama}</span>
                        <div class="flex gap-2">
                            <button onclick="ubahJumlahItem('${item.nama.replace(/'/g, "\\'")}', -1)" class="bg-stone-200 w-6 h-6 rounded-full font-bold">-</button>
                            <span class="text-sm font-bold w-4 text-center">${item.jumlah}</span>
                            <button onclick="ubahJumlahItem('${item.nama.replace(/'/g, "\\'")}', 1)" class="bg-[#d97706] text-white w-6 h-6 rounded-full font-bold">+</button>
                        </div>
                    </div>`;
            });
            badge.innerText = qty; listArea.innerHTML = listHTML; teksTotal.innerText = `Rp ${totalHarga.toLocaleString('id-ID')}`;
        }

        function bukaCheckout() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function kirimPesananKopi() {
            if (!isWarungBuka) {
                document.getElementById('modal-toko-tutup').classList.remove('hidden');
                return;
            }
            const nama = document.getElementById('nama-pemesan').value;
            const btn = document.getElementById('btn-kirim');
            if (keranjang.length === 0 || !nama) return tampilkanNotifikasi("Isi Nama & Keranjang!", "error");
            btn.innerText = "Memproses..."; btn.disabled = true;
            try {
                const { data, error } = await clientDB.from('pesanan_warung').insert([{
                    nama_pemesan: nama, alamat: "-", total_harga: totalHarga, detail_pesanan: keranjang, status: 'Pending'
                }]).select();
                if (error) throw error;
                let detailPesanan = keranjang.map(i => `• ${i.jumlah}x ${i.nama}`).join('%0A');
                let pesanTele = `🔔 *PESANAN BARU MASUK!*%0A%0A👤 *Nama:* ${nama}%0A🛍️ *Pesanan:*%0A${detailPesanan}%0A%0A💰 *Total:* Rp ${totalHarga.toLocaleString('id-ID')}%0A%0A🚶 *Segera Proses via Dashboard Admin!*`;
                fetch(`https://api.telegram.org/bot${TELE_TOKEN_KOPI}/sendMessage?chat_id=${TELE_ID_KOPI}&text=${pesanTele}&parse_mode=Markdown`, { mode: 'no-cors' });
                const orderId = data[0].id; 
                let riwayat = JSON.parse(localStorage.getItem('riwayatWarungBasecamp')) || [];
                const pesananBaru = { id: orderId, status: 'Pending', tanggal: new Date().toLocaleString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }), nama_pemesan: nama, total_harga: totalHarga, metode: 'COD', detail_pesanan: keranjang };
                riwayat.unshift(pesananBaru);
                localStorage.setItem('riwayatWarungBasecamp', JSON.stringify(riwayat));
                keranjang = []; localStorage.setItem('keranjangWarungBasecamp', JSON.stringify(keranjang)); 
                updateTampilanKeranjang(); tutupCheckout();
                document.getElementById('nama-pemesan').value = ''; 
                tampilkanNotifikasi("Pesanan Kopi Berhasil Dibuat!");
                setTimeout(() => { pesananAktif = pesananBaru; bukaLacakVisual(); }, 1000);
            } catch (err) { tampilkanNotifikasi("Gagal kirim!", "error"); } 
            finally { btn.innerText = "Kirim Pesanan"; btn.disabled = false; }
        }

        function bukaModalLacak() { document.getElementById('modal-lacak').classList.remove('hidden'); document.getElementById('input-nama-lacak').focus(); }
        function tutupModalLacak() { document.getElementById('modal-lacak').classList.add('hidden'); document.getElementById('input-nama-lacak').value = ''; }

        async function cariPesanan() {
            const namaCari = document.getElementById('input-nama-lacak').value.trim();
            if (!namaCari) return tampilkanNotifikasi("Masukkan nama terlebih dahulu!", "error");
            const btn = document.getElementById('btn-cari-lacak');
            btn.innerText = "MENCARI..."; btn.disabled = true;
            try {
                const { data, error } = await clientDB.from('pesanan_warung').select('*').ilike('nama_pemesan', namaCari).order('id', { ascending: false }).limit(1);
                if (error) throw error;
                if (data && data.length > 0) {
                    pesananAktif = data[0]; tutupModalLacak(); bukaLacakVisual(); tampilkanNotifikasi("Pesanan ditemukan!");
                } else { tampilkanNotifikasi("Pesanan tidak ditemukan/dihapus!", "error"); }
            } catch (err) { tampilkanNotifikasi("Gagal mencari data!", "error"); } 
            finally { btn.innerText = "CARI"; btn.disabled = false; }
        }

        function perbaruiVisualLacak() {
            if (!pesananAktif) return;
            const teksStatus = document.getElementById('teks-status-lacak');
            const ikonKurir = document.getElementById('ikon-kurir');
            const pesanMotivasi = document.getElementById('pesan-motivasi');
            ikonKurir.className = 'absolute text-5xl transition-all duration-1000 ease-in-out z-20';
            switch (pesananAktif.status) {
                case 'Pending': teksStatus.innerText = "MENUNGGU KONFIRMASI"; ikonKurir.style.left = "10%"; ikonKurir.style.top = "55%"; ikonKurir.classList.add('kurir-diam'); pesanMotivasi.innerText = '"Mohon tunggu ya, warung sedang mengecek pesananmu!"'; break;
                case 'Diproses': teksStatus.innerText = "SEDANG DISIAPKAN"; ikonKurir.style.left = "10%"; ikonKurir.style.top = "55%"; ikonKurir.classList.add('animasi-kurir-jalan'); pesanMotivasi.innerText = '"Mantap! Kopi dan udutmu sedang disiapkan!"'; break;
                case 'Dikirim': teksStatus.innerText = "SEDANG DIANTAR"; ikonKurir.style.left = "45%"; ikonKurir.style.top = "35%"; ikonKurir.classList.add('animasi-kurir-jalan'); pesanMotivasi.innerText = '"Siap-siap! Kurir berjalan menuju lokasimu 🏃‍♂️💨"'; break;
                case 'Selesai': teksStatus.innerText = "PESANAN TIBA"; ikonKurir.style.left = "75%"; ikonKurir.style.top = "15%"; ikonKurir.classList.add('kurir-diam'); pesanMotivasi.innerText = '"Pesanan sudah sampai. Selamat ngopi dan udut! ☕🚬"'; break;
            }
        }

        function pilihEWallet(idCode, providerName) {
            providerTerpilih = providerName;
            document.getElementById('pilih-dompet-container').classList.add('hidden');
            document.getElementById('label-dompet-terpilih').innerText = providerName;
            document.getElementById('ikon-dompet-terpilih').innerText = idCode;
            skuCodeTerpilih = ''; namaProdukTerpilih = ''; hargaJualTerpilih = 0;
            generateListNominal(idCode, providerName);
            document.getElementById('form-input-dinamis').classList.remove('hidden');
            document.getElementById('nama_pelanggan_topup').focus();
        }

        function gantiEWallet() {
            document.getElementById('form-input-dinamis').classList.add('hidden');
            document.getElementById('pilih-dompet-container').classList.remove('hidden');
            document.querySelectorAll('.wallet-card').forEach(card => card.classList.remove('active'));
        }

        function generateListNominal(idCode, providerName) {
            const container = document.getElementById('container-nominal');
            container.innerHTML = '';
            let daftarNominal = [];
            for (let i = 1000; i <= 10000; i += 1000) { daftarNominal.push({ nominal: i, harga: i + 2000 }); }
            for (let i = 15000; i <= 100000; i += 5000) { daftarNominal.push({ nominal: i, harga: i + 5000 }); }
            daftarNominal.forEach(item => {
                const sku = `${idCode}${item.nominal / 1000}`;
                const namaProduk = `${providerName} ${item.nominal.toLocaleString('id-ID')}`;
                container.innerHTML += `
                    <div onclick="setNominalAktif('${sku}', '${namaProduk}', ${item.harga}, this)" class="nominal-card p-4 rounded-xl flex justify-between items-center border border-slate-700/60 bg-slate-800/40 hover:border-slate-600 transition-all">
                        <div class="flex flex-col text-left">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">${providerName} Agen</span>
                            <span class="font-extrabold text-white text-sm">${item.nominal.toLocaleString('id-ID')}</span>
                        </div>
                        <span class="text-sm font-black text-emerald-400">Rp ${item.harga.toLocaleString('id-ID')}</span>
                    </div>`;
            });
        }

        function setNominalAktif(sku, nama, harga, element) {
            skuCodeTerpilih = sku; namaProdukTerpilih = nama; hargaJualTerpilih = harga;
            document.querySelectorAll('.nominal-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        async function loadRiwayatLive() {
            const container = document.getElementById('container-riwayat');
            let myTrxIds = JSON.parse(localStorage.getItem('my_basecamp_topup_ids')) || [];
            if (myTrxIds.length === 0) { container.innerHTML = `<div class="text-center text-slate-500 py-4">Belum ada transaksi di HP ini.</div>`; return; }
            const batasanWaktuHariIni = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data, error } = await clientDB.from('pesanan_pulsa').select('*').in('id', myTrxIds).gte('created_at', batasanWaktuHariIni).order('created_at', { ascending: false });
            if (error || !data || data.length === 0) { container.innerHTML = `<div class="text-center text-slate-500 py-4">Riwayat hari ini bersih otomatis.</div>`; return; }
            container.innerHTML = '';
            data.forEach(item => {
                const waktu = new Date(item.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                let statusBadge = `<span class="px-1.5 py-0.5 bg-yellow-500/10 text-yellow-500 text-[8px] font-black uppercase rounded tracking-wider border border-yellow-500/20">Pending</span>`;
                if (item.status === 'success') statusBadge = `<span class="px-1.5 py-0.5 bg-green-500/10 text-green-400 text-[8px] font-black uppercase rounded tracking-wider border border-green-500/20">Success</span>`;
                container.innerHTML += `
                    <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div class="flex flex-col text-left gap-0.5">
                            <span class="font-black text-white text-xs">${item.nama_produk}</span>
                            <span class="text-[10px] text-slate-400 font-mono tracking-wider">Tujuan: ${item.nomor_tujuan}</span>
                            <span class="text-[9px] text-slate-500 font-bold">${waktu} WIB</span>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <span class="font-extrabold text-emerald-400 text-xs">Rp ${parseInt(item.harga_jual).toLocaleString('id-ID')}</span>
                            ${statusBadge}
                        </div>
                    </div>`;
            });
        }

        async function kirimTopUp() {
            if (!isWarungBuka) {
                document.getElementById('modal-toko-tutup').classList.remove('hidden');
                return;
            }
            const namaPelanggan = document.getElementById('nama_pelanggan_topup').value.trim();
            const noHp = document.getElementById('nomor_hp').value.trim();
            if (!namaPelanggan) return tampilkanNotifikasi("Isi nama pelanggan dulu Mas!", "error");
            if (!noHp) return tampilkanNotifikasi("Isi nomor HP tujuan dulu Mas!", "error");
            if (!skuCodeTerpilih) return tampilkanNotifikasi("Pilih nominal saldonya dulu Mas!", "error");
            const btn = document.getElementById('btn-submit-topup');
            btn.innerText = "MEMPROSES..."; btn.disabled = true;
            try {
                const { data, error } = await clientDB.from('pesanan_pulsa').insert([{ nama_produk: namaProdukTerpilih, sku_code: skuCodeTerpilih, nomor_tujuan: noHp, harga_jual: hargaJualTerpilih, status: 'pending' }]).select();
                if (error || !data) throw error;
                document.getElementById('modal-success-topup').classList.remove('hidden');
                let currentSavedIds = JSON.parse(localStorage.getItem('my_basecamp_topup_ids')) || [];
                currentSavedIds.unshift(data[0].id); 
                localStorage.setItem('my_basecamp_topup_ids', JSON.stringify(currentSavedIds));
                loadRiwayatLive();
                const pesanTele = `🔔 *ADA ANTREAN TOP UP MASUK* 🔔\n\n👤 *Nama:* ${namaPelanggan}\n🎯 *No Tujuan:* ${noHp}\n📦 *Produk:* ${namaProdukTerpilih}\n🆔 *SKU Code:* ${skuCodeTerpilih}\n💵 *Harga Jual:* Rp ${hargaJualTerpilih.toLocaleString('id-ID')}\n⚡ *Status:* PENDING\n\n_Harap buka adminpulsa.html untuk memproses_`;
                fetch(`https://api.telegram.org/bot${TELE_TOKEN_TOPUP}/sendMessage?chat_id=${TELE_ID_TOPUP}&text=${encodeURIComponent(pesanTele)}&parse_mode=Markdown`, { mode: 'no-cors' });
                document.getElementById('nama_pelanggan_topup').value = '';
                document.getElementById('nomor_hp').value = '';
                skuCodeTerpilih = ''; 
                gantiEWallet();
            } catch (err) { tampilkanNotifikasi("Gagal simpan database!", "error"); } 
            finally { btn.innerText = "KIRIM TOP UP"; btn.disabled = false; }
        }

        updateTampilanKeranjang(); 
        ambilDataMenu();
        cekStatusWarungDB();
    </script>
</body>
</html>
