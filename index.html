<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warung Kopi Siap Antar & Top Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes jalan-maju { 0% { transform: translateX(-10px) scaleX(-1); } 50% { transform: translateX(10px) scaleX(-1); } 100% { transform: translateX(-10px) scaleX(-1); } }
        .animasi-jalan-maju { animation: jalan-maju 1.5s infinite ease-in-out; display: inline-block; }
        @keyframes lompat-jalan { 0%, 100% { transform: translateY(0) scaleX(-1); } 50% { transform: translateY(-8px) scaleX(-1); } }
        .animasi-kurir-jalan { animation: lompat-jalan 0.6s infinite; }
        .kurir-diam { transform: scaleX(-1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .input-dark { background-color: #1E293B; border: 1px solid #334155; color: white; transition: 0.3s; }
        .input-dark:focus { border-color: #3B82F6; outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .wallet-card { background: #1E293B; border: 2px solid #334155; cursor: pointer; transition: 0.3s; width: 100%; }
        .wallet-card.active { border-color: #3B82F6; background: #1E3A8A; transform: scale(1.02); }
        .nominal-card { background: #1E293B; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nominal-card.active { border-color: #10B981; background: #064E3B; }
    </style>
</head>
<body class="bg-stone-100 pb-24">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-24 opacity-0 z-[100] transition-all duration-300 pointer-events-none w-[90%] max-w-sm">
        <div id="toast-content" class="px-6 py-3 rounded-full shadow-2xl text-sm font-bold text-white flex items-center justify-center gap-2"></div>
    </div>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg overflow-hidden border border-stone-200 relative">
        
        <div class="bg-[#292524] text-amber-50 p-4 sticky top-0 z-10 shadow-md border-b-4 border-[#d97706] relative" id="header-utama">
            <h1 class="text-xl font-extrabold text-center tracking-wide text-[#f59e0b] leading-snug">☕PINGIN NGOPI KARO UDUT TAPI MAGER WARUNG KOPI SIAP ANTAR</h1>
            <p class="text-center text-sm text-stone-200 mt-1"> <span class="animasi-jalan-maju">🚶‍♀️</span></p>
            <button onclick="bukaModalPin()" class="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-60 hover:opacity-100 transition duration-300">⚙️</button>
        </div>  <a href="/download.html" class="bg-white text-blue-700 px-4 py-2 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition">
                    INSTAL
                </a> 
        
        <div class="p-4 bg-stone-50 min-h-screen" id="halaman-beranda">
            <h2 class="text-lg font-bold text-stone-800 mb-3">Daftar Menu</h2>
            
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-4 rounded-3xl mb-5 flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="bg-black/20 p-3 rounded-2xl text-Black">📱</div>
                    <div>
                        <p class="text-white font-black text-sm">VERSI APLIKASI</p>
                        <p class="text-blue-100 text-[10px]">Lebih ringan & sat-set!</p>
                    </div>
                </div>
                <a href="/download.html" class="bg-white text-blue-700 px-4 py-2 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition">
                    INSTAL
                </a> 
            </div>
            
            <div id="kategori-container" class="flex gap-2 overflow-x-auto hide-scroll mb-4 pb-2 border-b-2 border-stone-200 sticky top-[132px] bg-stone-50 z-10"></div>
            <div id="ruang-menu" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div class="bg-[#0F172A] min-h-screen flex-col items-center p-4 pt-8 pb-24 hidden" id="halaman-topup">
            <div class="w-full bg-[#1E293B] p-6 rounded-[2.5rem] shadow-2xl border border-slate-800 mb-6">
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-extrabold italic text-blue-500 tracking-tighter">TOP UP <span class="text-white">DELIVERY (COD)</span></h1>
                </div>
                <div class="space-y-6">
                    <div id="pilih-dompet-container">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest ml-1">Pilih e-Wallet</label>
                        <div class="grid grid-cols-2 gap-3 w-full">
                            <div onclick="pilihEWallet('SPP', 'ShopeePay')" class="wallet-card p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center font-black text-white text-xs shadow-md">SPP</div>
                                <span class="font-bold text-xs uppercase tracking-wider text-white">ShopeePay</span>
                            </div>
                            <div onclick="pilihEWallet('GPY', 'Gopay')" class="wallet-card p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center font-black text-white text-xs shadow-md">GPY</div>
                                <span class="font-bold text-xs uppercase tracking-wider text-white">Gopay</span>
                            </div>
                        </div>
                    </div>
                    <div id="form-input-dinamis" class="hidden space-y-5">
                        <input type="text" id="nama_pelanggan_topup" placeholder="Nama..." class="w-full p-4 rounded-xl input-dark text-sm font-bold tracking-wider">
                        <input type="number" id="nomor_hp" placeholder="08xxxxxxxxxx" class="w-full p-4 rounded-xl input-dark text-xl font-bold tracking-wider">
                        <div id="container-nominal" class="grid grid-cols-1 gap-2.5"></div>
                        <button onclick="kirimTopUp()" id="btn-submit-topup" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase shadow-xl transition-all active:scale-95">KIRIM TOP UP</button>
                    </div>
                </div>
            </div>
            <div class="w-full bg-[#1E293B] p-6 rounded-[2.5rem] shadow-2xl border border-slate-800">
                <h2 class="font-black text-xs text-blue-400 uppercase tracking-widest mb-4">📋 Riwayat Top Up</h2>
                <div id="container-riwayat" class="space-y-3 max-h-64 overflow-y-auto text-xs"></div>
            </div>
        </div>

        <div class="min-h-screen bg-[#131722] text-white p-5 flex-col items-center pt-8 pb-24 hidden" id="halaman-lacak-visual">
            <h1 id="teks-status-lacak" class="text-2xl font-extrabold italic mb-10 text-center">MENCARI...</h1>
            <div id="ikon-kurir" class="absolute text-5xl transition-all duration-1000 ease-in-out z-20" style="left: 10%; top: 55%;">🚶</div>
            <button onclick="bukaBeranda()" class="mt-6 bg-[#161b28] w-full py-4 rounded-xl font-extrabold text-sm text-gray-300">KEMBALI KE MENU</button>
        </div>

        <div id="modal-checkout" class="hidden fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center">
            <div class="bg-white w-full max-w-md p-6 rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-stone-800">Keranjang</h2>
                    <button onclick="tutupCheckout()" class="text-stone-400 font-bold text-3xl">&times;</button>
                </div>
                <div id="daftar-pesanan-checkout" class="flex flex-col mb-4"></div>
                <button id="btn-kirim" onclick="kirimPesananKopi()" class="w-full bg-[#d97706] text-white font-extrabold py-3.5 rounded-xl">Kirim Pesanan</button>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1a1f2e] border-t border-gray-800 z-40 flex justify-around items-center px-4 py-3 pb-safe rounded-t-3xl" id="nav-bawah">
            <button onclick="bukaModalLacak()" class="flex flex-col items-center text-gray-400"><span class="text-2xl">🔍</span><span class="text-[9px] font-extrabold mt-1">LACAK</span></button>
            <button onclick="bukaBeranda()" class="flex flex-col items-center text-[#22c55e] bg-[#1f2937] p-3 rounded-2xl -mt-8 shadow-lg"><span class="text-3xl">🏠</span><span class="text-[9px] text-white font-extrabold mt-1">BERANDA</span></button>
            <button onclick="bukaTopUp()" class="flex flex-col items-center text-gray-400"><span class="text-2xl">💳</span><span class="text-[9px] font-extrabold mt-1">TOP UP</span></button>
            <button onclick="bukaCheckout()" class="flex flex-col items-center text-gray-400"><span class="text-2xl">🛒</span><span class="text-[9px] font-extrabold mt-1">KERANJANG</span></button>
        </div>
    </div>

    <script>
        // ... (Script logika tetap sama sesuai file Anda sebelumnya) ...
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const clientDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Fungsi dasar yang dipanggil untuk memuat data
        async function ambilDataMenu() { const { data } = await clientDB.from('menu_warung').select('*'); if(data) { semuaMenuDB = data; renderMenu(); } }
        function bukaBeranda() { document.getElementById('halaman-beranda').classList.remove('hidden'); document.getElementById('halaman-topup').classList.add('hidden'); document.getElementById('halaman-lacak-visual').classList.add('hidden'); }
        function bukaTopUp() { document.getElementById('halaman-beranda').classList.add('hidden'); document.getElementById('halaman-topup').classList.remove('hidden'); }
        function bukaCheckout() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        
        ambilDataMenu();
    </script>
</body>
</html>
