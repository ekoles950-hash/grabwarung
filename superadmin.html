<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Super Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0F172A; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #1E293B; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .btn-menu { background: #334155; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn-save { background: #2563EB; padding: 5px 10px; border-radius: 5px; font-size: 11px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="flex gap-2 mb-6">
        <button onclick="tampilPanel('panel-data')" class="btn-menu">PELANGGAN</button>
        <button onclick="tampilPanel('panel-topup')" class="btn-menu">TOP UP</button>
    </div>

    <div id="panel-data" class="panel">
        <h2 class="font-black mb-4">Edit Hutang Manual</h2>
        <div id="tabel-pelanggan" class="space-y-3">Memuat data...</div>
    </div>

    <div id="panel-topup" class="panel hidden">
        <h2 class="font-black mb-4">Antrean Top Up</h2>
        <div id="tabel-topup" class="space-y-3">Memuat antrean...</div>
    </div>

    <script>
        const sb = supabase.createClient('https://butydxuauhtvwojvpixt.supabase.co', 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X');

        function tampilPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // AMBIL DATA PELANGGAN
        async function muatDataPelanggan() {
            const { data } = await sb.from('pelanggan').select('*');
            let html = '';
            data.forEach(p => {
                let h = parseInt(p.hutang || 0);
                html += `<div class="card">
                    <div class="mb-2"><strong>${p.nama}</strong><br><small class="text-red-400">Hutang: Rp ${h.toLocaleString()}</small></div>
                    <div class="flex gap-2">
                        <input type="number" id="input-${p.nama}" class="bg-slate-700 w-full p-2 rounded text-xs" placeholder="Input Rupiah...">
                        <button onclick="updateHutang('${p.nama}')" class="btn-save">SIMPAN</button>
                    </div>
                </div>`;
            });
            document.getElementById('tabel-pelanggan').innerHTML = html;
        }

        // AMBIL DATA TOP UP (ANTREAN)
        async function muatDataTopUp() {
            const { data } = await sb.from('topup_saldo').select('*').eq('status', 'Pending');
            let html = '';
            if(data && data.length > 0) {
                data.forEach(t => {
                    html += `<div class="card flex justify-between items-center">
                        <div><div class="font-bold text-xs">${t.nama_pelanggan}</div><div class="text-[10px] text-blue-400">Rp ${t.nominal.toLocaleString()}</div></div>
                        <button onclick="approve('${t.id}')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">APPROVE</button>
                    </div>`;
                });
            } else { html = "Tidak ada antrean."; }
            document.getElementById('tabel-topup').innerHTML = html;
        }

        async function updateHutang(nama) {
            const val = document.getElementById('input-' + nama).value;
            if(!val) return alert("Isi angkanya!");
            await sb.from('pelanggan').update({ hutang: parseInt(val) }).eq('nama', nama);
            alert("Berhasil!"); muatDataPelanggan();
        }

        async function approve(id) {
            await sb.from('topup_saldo').update({ status: 'success' }).eq('id', id);
            muatDataTopUp();
        }

        muatDataPelanggan();
        muatDataTopUp();
    </script>
</body>
</html>
