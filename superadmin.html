<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER ADMIN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { background-color: #0F172A; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-4">

    <div class="flex gap-2 mb-6">
        <button onclick="tampilPanel('panel-data')" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">PELANGGAN</button>
        <button onclick="tampilPanel('panel-topup')" class="bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold">TOP UP & PULSA</button>
    </div>

    <div id="panel-data" class="panel bg-[#1E293B] p-5 rounded-2xl border border-slate-700">
        <h2 class="font-black mb-4">Edit Data Pelanggan</h2>
        <div id="tabel-pelanggan" class="text-sm space-y-4">Memuat data...</div>
    </div>

    <div id="panel-topup" class="panel hidden bg-[#1E293B] p-5 rounded-2xl border border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-black">Antrean Saldo & Pulsa</h2>
            <button onclick="muatDataTopUp()" class="bg-slate-600 px-3 py-1 rounded text-[10px] font-bold">REFRESH</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-[10px]">
                <thead><tr class="text-slate-400 border-b border-slate-700">
                    <th class="p-2">Waktu</th><th class="p-2">Produk</th><th class="p-2">Tujuan</th><th class="p-2">Aksi</th>
                </tr></thead>
                <tbody id="tabel-topup"></tbody>
            </table>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://butydxuauhtvwojvpixt.supabase.co', 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X');

        function tampilPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // PELANGGAN - Edit Hutang, Saldo, Koin
        async function muatDataPelanggan() {
            const { data } = await sb.from('pelanggan').select('*');
            let html = '';
            data.forEach(p => {
                html += `<div class="border-b border-slate-700 pb-3 mb-3">
                    <div class="font-bold mb-2 text-blue-400">${p.nama}</div>
                    <div class="grid grid-cols-3 gap-2 text-[9px]">
                        <div>
                            <div class="text-slate-400">Hutang:</div>
                            <div class="text-red-400 font-bold">Rp ${parseInt(p.hutang || 0).toLocaleString()}</div>
                            <input type="number" id="input-hutang-${p.nama}" class="bg-slate-700 w-full p-1 rounded mt-1" placeholder="Rp">
                            <button onclick="updateData('${p.nama}', 'hutang')" class="bg-blue-600 w-full mt-1 rounded text-white font-bold">SET</button>
                        </div>
                        <div>
                            <div class="text-slate-400">Saldo:</div>
                            <div class="text-green-400 font-bold">Rp ${parseInt(p.saldo || 0).toLocaleString()}</div>
                            <input type="number" id="input-saldo-${p.nama}" class="bg-slate-700 w-full p-1 rounded mt-1" placeholder="Rp">
                            <button onclick="updateData('${p.nama}', 'saldo')" class="bg-blue-600 w-full mt-1 rounded text-white font-bold">SET</button>
                        </div>
                        <div>
                            <div class="text-slate-400">Koin:</div>
                            <div class="text-yellow-400 font-bold">${parseInt(p.koin || 0).toLocaleString()}</div>
                            <input type="number" id="input-koin-${p.nama}" class="bg-slate-700 w-full p-1 rounded mt-1" placeholder="Qty">
                            <button onclick="updateData('${p.nama}', 'koin')" class="bg-blue-600 w-full mt-1 rounded text-white font-bold">SET</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('tabel-pelanggan').innerHTML = html;
        }

        // Fungsi Update Dinamis
        async function updateData(nama, kolom) {
            const val = document.getElementById('input-' + kolom + '-' + nama).value;
            if(!val) return alert("Silakan masukkan angka!");
            
            const updateObj = {};
            updateObj[kolom] = parseInt(val);
            
            const { error } = await sb.from('pelanggan').update(updateObj).eq('nama', nama);
            
            if (error) {
                alert("Gagal update: " + error.message);
            } else {
                alert("Berhasil update " + kolom + " untuk " + nama);
                muatDataPelanggan();
            }
        }

        // TOP UP / PULSA
        async function muatDataTopUp() {
            const { data } = await sb.from('pesanan_pulsa').select('*').eq('status', 'pending').order('created_at', { ascending: false });
            let html = '';
            if(data && data.length > 0) {
                data.forEach(t => {
                    const jam = new Date(t.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    html += `<tr class="border-b border-slate-800">
                        <td class="p-2 text-slate-400">${jam}</td>
                        <td class="p-2">${t.nama_produk}<br><span class="text-blue-400">${t.sku_code}</span></td>
                        <td class="p-2">${t.nomor_tujuan}</td>
                        <td class="p-2"><button onclick="approve('${t.id}')" class="bg-green-600 px-2 py-1 rounded font-bold">✓</button></td>
                    </tr>`;
                });
            } else { html = "<tr><td colspan='4' class='p-4 text-center'>Tidak ada antrean.</td></tr>"; }
            document.getElementById('tabel-topup').innerHTML = html;
        }

        async function approve(id) {
            await sb.from('pesanan_pulsa').update({ status: 'success' }).eq('id', id);
            muatDataTopUp();
        }

        muatDataPelanggan();
        muatDataTopUp();
    </script>
</body>
</html>
