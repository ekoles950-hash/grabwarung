<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="p-5">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-black mb-5 text-blue-400">Panel Super Admin</h1>
        
        <div class="bg-[#1E293B] p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">Data Pelanggan</h2>
                <button onclick="muatDataAdmin()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">RELOAD</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="py-2">Nama</th>
                            <th class="py-2">Saldo</th>
                            <th class="py-2">Hutang</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-admin">
                        <tr><td colspan="3" class="py-4 text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const clientDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function muatDataAdmin() {
            const tabel = document.getElementById('tabel-admin');
            tabel.innerHTML = '<tr><td colspan="3" class="py-4 text-center">Memuat data...</td></tr>';
            
            try {
                const { data } = await clientDB.from('pelanggan').select('*');
                let html = '';
                data.forEach(p => {
                    let hutang = p.hutang !== undefined ? p.hutang : (p['Total hutang'] || 0);
                    html += `<tr class="border-b border-slate-800">
                        <td class="py-3">${p.nama}</td>
                        <td class="py-3">Rp ${parseInt(p.saldo).toLocaleString('id-ID')}</td>
                        <td class="py-3 text-red-400 font-bold">Rp ${parseInt(hutang).toLocaleString('id-ID')}</td>
                    </tr>`;
                });
                tabel.innerHTML = html;
            } catch (e) {
                tabel.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-red-500">Gagal ambil data</td></tr>';
            }
        }

        // Langsung jalankan saat dibuka
        muatDataAdmin();
    </script>
</body>
</html>
