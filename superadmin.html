<!-- GANTI BAGIAN PANEL PELANGGAN DENGAN INI -->
<div id="panel-data" class="panel bg-[#1E293B] p-5 rounded-2xl border border-slate-700">
    <h2 class="font-black mb-4">Edit Hutang Manual</h2>
    <div id="tabel-pelanggan" class="text-sm space-y-4">Memuat...</div>
</div>

<!-- GANTI BAGIAN PANEL TOP UP DENGAN INI -->
<div id="panel-topup" class="panel hidden bg-[#1E293B] p-5 rounded-2xl border border-slate-700">
    <h2 class="font-black mb-4">Antrean Top Up</h2>
    <div id="tabel-topup" class="text-xs space-y-2">Memuat antrean...</div>
</div>

<script>
    // FUNGSI UPDATE HUTANG MANUAL
    async function updateHutang(nama) {
        const inputVal = document.getElementById('input-' + nama).value;
        const jumlah = parseInt(inputVal);
        if(isNaN(jumlah)) return alert("Masukkan angka yang benar!");
        if(!confirm(`Ubah hutang ${nama} jadi Rp ${jumlah.toLocaleString()}?`)) return;
        await sb.from('pelanggan').update({ hutang: jumlah }).eq('nama', nama);
        muatDataPelanggan();
    }

    // TAMPIL PELANGGAN DENGAN INPUT MANUAL
    async function muatDataPelanggan() {
        const { data } = await sb.from('pelanggan').select('*');
        let html = '';
        data.forEach(p => {
            html += `<div class="bg-slate-800 p-3 rounded-xl flex flex-col gap-2">
                <div class="font-bold">${p.nama} (Hutang: Rp ${parseInt(p.hutang || 0).toLocaleString()})</div>
                <div class="flex gap-2">
                    <input type="number" id="input-${p.nama}" class="w-full bg-slate-700 p-2 rounded text-white text-xs" placeholder="Input manual...">
                    <button onclick="updateHutang('${p.nama}')" class="bg-blue-600 px-3 rounded text-xs font-bold">SAVE</button>
                </div>
            </div>`;
        });
        document.getElementById('tabel-pelanggan').innerHTML = html;
    }

    // MONITORING TOP UP OTOMATIS
    async function muatDataTopUp() {
        const { data } = await sb.from('topup_saldo').select('*').eq('status', 'Pending');
        let html = '';
        data.forEach(t => {
            html += `<div class="flex justify-between p-2 border-b border-slate-700">
                <span>${t.nama_pelanggan} - Rp ${t.nominal.toLocaleString()}</span>
                <button onclick="approve('${t.id}')" class="text-green-400 font-bold text-xs">APPROVE</button>
            </div>`;
        });
        document.getElementById('tabel-topup').innerHTML = html || "Tidak ada antrean.";
    }

    // Panggil kedua fungsi saat halaman dibuka
    muatDataPelanggan();
    muatDataTopUp();
</script>
